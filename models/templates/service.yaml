---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "models.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: vllm
    model: {{ .Values.configs.name }}
    name: {{ include "models.fullname" . }}
spec:
  ports:
  - name: http-vllm
    port: 80
    protocol: TCP
    targetPort: 8000
  - name: http-lmcache
    port: 7000
    protocol: TCP
    targetPort: 7000
  - name: http-lmcache-cpu
    port: 9000
    protocol: TCP
    targetPort: 9000
  selector:
    app: vllm
    model: {{ .Values.configs.name }}
    name: {{ include "models.fullname" . }}
  sessionAffinity: None
  type: NodePort
