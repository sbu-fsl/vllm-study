## NOTE: This file is template for model values configuration.
## Please create a copy of this file and fill in the values accordingly.

## This model has 40 attention heads, which must be divisible by the tensor parallel size.

# namespace configs
namespace: llm-servings

# model configs
configs:
  name: deepseek-r1-32b
  model: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
  max_model_len: 36000
  max_num_seqs: 1

# gpu configs
# RTX A5000 with 24.5 GB of VRAM (1) / Quadro 6000 with 24.5 GB of VRAM (2)
gpu:
  type: "q6000" # must be a5000 or q6000
  count: 4   # adjust this based on tensor-parallel-size

# storage configs
storage:
  type: "local" # must be local or gpfs

# Kubernetes liveness and readiness probes
liveprobe:
  initdelay: 300
  period: 300
readyprobe:
  initdelay: 300
  period: 300
